# OTel Collector config for the Lambda Layer extension (configs 4, 6, 7, 8, 9, 10).
#
# This file is packaged into a Lambda layer at /opt/collector-config/config.yaml.
# The collector extension reads it on startup.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: localhost:4317
      http:
        endpoint: localhost:4318

exporters:
  otlp_http:
    endpoint: ${env:OTLP_ENDPOINT}
    headers:
      authorization: Basic ${env:OTLP_AUTH_STRING}
    tls:
      insecure: false

service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlp_http]
    metrics:
      receivers: [otlp]
      exporters: [otlp_http]
    logs:
      receivers: [otlp]
      exporters: [otlp_http]
